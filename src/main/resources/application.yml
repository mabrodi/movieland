spring:
    application:
        name: movie-land

    config:
        import: optional:classpath:springdoc-messages.yml

#    datasource:
#        url: jdbc:postgresql://localhost:5432/movieland
#        username: postgres
#        password: postgres
#        driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

    datasource:
        url: ${SPRING_DATASOURCE_URL}
        username: ${SPRING_DATASOURCE_USERNAME}
        password: ${SPRING_DATASOURCE_PASSWORD}
        driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

    jpa:
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                format_sql: true

    flyway:
        enabled: true
        validate-on-migrate: true
        locations:
            -   classpath:db/migration/schema
            -   classpath:db/migration/data


    cache:
        type: ${SPRING_CACHE_TYPE:redis}

    data:
        redis:
            host: ${DATA_REDIS_HOST}
            port: ${DATA_REDIS_PORT}

server:
    port: ${PORT:8080}


cache:
    default: 60 #1h in min
    genre: 240 #4 h in min

cron:
    rate: "0 30 15 * * *" #every day 15:30

#client:
#    rate:
#        url: https://bank.gov.ua



client:
    rate:
        url: ${CLIENT_RATE_URL}


concurrent:
    enrichment:
        timeout: 5

logging:
    config: classpath:logback-spring.xml

security:
    jwt:
        secret: ${SECURITY_JWT_SECRET:his-is-a-very-long-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256}
        ttl-seconds: ${SECURITY_JWT_TTL:900} #15 min
        blacklist:
            cleanup-cron: "0 * * * * *" # every minute

springdoc:
#    open-api:
#        info:
#            title: Movieland
#            description: REST API for managing movie catalog.
#            version: 1.0.0
    swagger-ui:
        display-request-duration: true
        filter: false
        doc-expansion: list
        operations-sorter: method
        path: "/swagger-ui.html"

    override-with-generic-response: false
    default-consumes-media-type: application/json
    default-produces-media-type: application/json

