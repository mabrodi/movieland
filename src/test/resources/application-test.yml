spring:
    application:
        name: movie-land-test

    jpa:
        hibernate:
            ddl-auto: none
            dialect: org.hibernate.dialect.PostgreSQLDialect

    flyway:
        enabled: true
        validate-on-migrate: true
        locations:
            -   classpath:db/migration/schema

    cache:
        type: redis

    data:
        redis:
            host: localhost
            port: 6379

server:
    port: 0

security:
    jwt:
        secret: test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256
        ttl-seconds: 900
        blacklist:
            cleanup-cron: "0 * * * * *"

concurrent:
    enrichment:
        timeout: 5000

client:
    rate:
        url: https://bank.gov.ua

logging:
    level:
        org.springframework.web: DEBUG
        org.dimchik: DEBUG
